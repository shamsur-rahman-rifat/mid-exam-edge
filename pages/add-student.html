<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudentHub — Add Student</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Project CSS -->
  
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="icon" href="https://images.unsplash.com/photo-1593882100241-aef1449fe351" type="image/x-icon"/>

</head>
<body>

<!-- ══════════════════════════════════
     NAVBAR
══════════════════════════════════ -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-xl">

    <a class="navbar-brand" href="../index.html">
      StudentHub <span class="brand-badge">Beta</span>
    </a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#navbarMenu"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link" id="nav-home" href="../index.html">
            <i class="bi bi-house"></i> Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-add" href="add-student.html">
            <i class="bi bi-person-plus"></i> Add Student
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-view" href="view-students.html">
            <i class="bi bi-table"></i> View Students
          </a>
        </li>
      </ul>
    </div>

  </div>
</nav>
<!-- /NAVBAR -->


<!-- ══════════════════════════════════
     PAGE CONTENT
══════════════════════════════════ -->
<div class="page-wrapper fade-in">
  <div class="container-main">

    <!-- Page Header -->
    <div class="page-header">
      <h2>
        <i class="bi bi-person-plus-fill"></i>
        Add New Student
      </h2>
      <p>Complete all fields below to register a student in the system.</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">

        <!-- Form Card -->
        <div class="form-section-card" id="addStudentForm">

          <div class="row g-3">

            <!-- Student ID -->
            <div class="col-md-6">
              <label class="form-label" for="studentId">Student ID</label>
              <input
                type="text"
                class="form-control"
                id="studentId"
                placeholder="e.g. STU-2024-001"
                autocomplete="off"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Full Name -->
            <div class="col-md-6">
              <label class="form-label" for="studentName">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="studentName"
                placeholder="e.g. Rahim Uddin"
                autocomplete="off"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Email -->
            <div class="col-md-6">
              <label class="form-label" for="studentEmail">Email Address</label>
              <input
                type="email"
                class="form-control"
                id="studentEmail"
                placeholder="student@email.com"
                autocomplete="off"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Phone -->
            <div class="col-md-6">
              <label class="form-label" for="studentPhone">Phone Number</label>
              <input
                type="tel"
                class="form-control"
                id="studentPhone"
                placeholder="017XXXXXXXX"
                autocomplete="off"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Course -->
            <div class="col-12">
              <label class="form-label" for="studentCourse">Course</label>
              <select class="form-select" id="studentCourse">
                <option value="" disabled selected>— Select a course —</option>
                <option>Full Stack Web Development</option>
                <option>Cybersecurity & Ethical Hacking</option>
                <option>AI & Machine Learning</option>
              </select>
              <div class="invalid-feedback"></div>
            </div>

            <!-- Actions -->
            <div class="col-12 d-flex gap-2 flex-wrap pt-2">
              <button class="btn btn-primary" id="submitBtn">
                <i class="bi bi-plus-circle me-1"></i>Add Student
              </button>
              <button class="btn btn-outline-secondary" id="clearBtn">
                <i class="bi bi-x-circle me-1"></i>Clear
              </button>
            </div>

          </div><!-- /row -->
        </div><!-- /form-section-card -->

      </div>
    </div><!-- /row -->
  </div><!-- /container-main -->
</div><!-- /page-wrapper -->


<!-- ══════════════════════════════════
     SUCCESS MODAL
══════════════════════════════════ -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:380px;">
    <div class="modal-content">
      <div class="modal-body">

        <div class="modal-success-icon">
          <i class="bi bi-check-lg"></i>
        </div>

        <h4>Thank You!</h4>
        <p>The new student has been added successfully and saved to your browser.</p>

        <div class="modal-actions">
          <button class="btn btn-primary btn-sm" id="modalViewBtn"
            style="font-size:.85rem;padding:.5rem 1.3rem;">
            <i class="bi bi-table me-1"></i>View Students
          </button>
          <button class="btn btn-outline-secondary btn-sm" id="modalAddBtn"
            style="font-size:.85rem;padding:.5rem 1.3rem;">
            Add Another
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
<!-- /MODAL -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Storage utility -->
<script src="../js/storage.js"></script>
<!-- Navbar active link -->
<script src="../js/navbar.js"></script>
<!-- Page logic -->
<script src="../js/add-student.js"></script>

</body>
</html>
