<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudentHub — View Students</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Project CSS -->
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- ══════════════════════════════════
     NAVBAR
══════════════════════════════════ -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-xl">

    <a class="navbar-brand" href="../index.html">
      StudentHub <span class="brand-badge">Beta</span>
    </a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#navbarMenu"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link" id="nav-home" href="../index.html">
            <i class="bi bi-house"></i> Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-add" href="add-student.html">
            <i class="bi bi-person-plus"></i> Add Student
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-view" href="view-students.html">
            <i class="bi bi-table"></i> View Students
          </a>
        </li>
      </ul>
    </div>

  </div>
</nav>
<!-- /NAVBAR -->


<!-- ══════════════════════════════════
     PAGE CONTENT
══════════════════════════════════ -->
<div class="page-wrapper fade-in">
  <div class="container-main">

    <!-- Page Header -->
    <div class="page-header">
      <h2>
        <i class="bi bi-people-fill"></i>
        All Students
      </h2>
      <p>Every registered student record is listed below. You can delete individual records or clear all.</p>
    </div>

    <!-- Table Card -->
    <div class="sh-card">

      <!-- Stats bar -->
      <div class="stats-bar">
        <span class="stat-label">
          Total Students: <strong id="studentCount">0</strong>
        </span>
        <button class="btn-clear-all" id="clearAllBtn">
          <i class="bi bi-trash3"></i> Clear All
        </button>
      </div>

      <!-- Table -->
      <div class="sh-table-wrap">
        <table class="sh-table" id="studentTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Student ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Course</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <!-- Rows injected by view-students.js -->
          </tbody>
        </table>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="bi bi-person-slash empty-icon"></i>
        <p>No students have been added yet.</p>
      </div>

    </div><!-- /sh-card -->

  </div><!-- /container-main -->
</div><!-- /page-wrapper -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Storage utility -->
<script src="../js/storage.js"></script>
<!-- Navbar active link -->
<script src="../js/navbar.js"></script>
<!-- Page logic -->
<script src="../js/view-students.js"></script>

</body>
</html>
